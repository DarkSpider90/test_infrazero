<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraZero Test App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
  .card { text-align: center; padding: 48px; border-radius: 16px; background: #1e293b; border: 1px solid #334155; max-width: 520px; width: 100%; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; }
  button { padding: 12px 32px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: #3b82f6; color: #fff; transition: background 0.2s; }
  button:hover { background: #2563eb; }
  .confetti { position: fixed; pointer-events: none; font-size: 28px; animation: fall 2.5s ease-in forwards; z-index: 10; }
  @keyframes fall { 0% { opacity: 1; transform: translateY(-20px) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
  #message { margin-top: 24px; font-size: 18px; font-weight: 600; color: #34d399; min-height: 28px; }
  .secrets { margin-top: 32px; text-align: left; }
  .secrets h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; text-align: center; }
  .secrets table { width: 100%; border-collapse: collapse; }
  .secrets td, .secrets th { border: 1px solid #334155; padding: 8px 12px; font-size: 13px; font-family: monospace; }
  .secrets th { background: #0f172a; color: #60a5fa; }
  .secrets .val { color: #4ade80; word-break: break-all; }
  .secrets .meta { color: #fbbf24; font-style: italic; }
  .secrets .err { color: #f87171; }
  .reload-btn { margin-top: 12px; padding: 6px 16px; font-size: 13px; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; cursor: pointer; }
  .reload-btn:hover { background: #475569; }
</style>
</head>
<body>
<div class="card">
  <h1>🚀 InfraZero Test</h1>
  <p>If you see this page, your deployment is working.</p>
  <button onclick="celebrate()">Celebrate!</button>
  <div id="message"></div>

  <div class="secrets">
    <h2>🔐 Mounted Secrets</h2>
    <div id="secrets-table">Loading...</div>
    <button class="reload-btn" onclick="loadSecrets()">↻ Reload Secrets</button>
  </div>
</div>
<script>
function celebrate() {
  document.getElementById('message').textContent = '🎉 Congratulations! Everything works!';
  const emojis = ['🎉','🎊','✨','🥳','🚀','⭐','💫','🎈'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDelay = Math.random() * 0.8 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

async function loadSecrets() {
  const el = document.getElementById('secrets-table');
  try {
    const res = await fetch('/api/secrets');
    const data = await res.json();
    const keys = Object.keys(data);
    if (data._status) {
      const cls = data._status === 'error' ? 'err' : 'meta';
      el.innerHTML = `<p class="${cls}">${data._msg}</p>`;
      return;
    }
    if (!keys.length) { el.innerHTML = '<p class="meta">No secrets</p>'; return; }
    el.innerHTML = '<table><tr><th>Key</th><th>Value</th></tr>' +
      keys.map(k => `<tr><td>${k}</td><td class="val">${data[k]}</td></tr>`).join('') +
      '</table>';
  } catch (e) { el.innerHTML = `<p class="err">Failed: ${e.message}</p>`; }
}

loadSecrets();
</script>
</body>
</html>
